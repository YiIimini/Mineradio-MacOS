<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:658px;height:498px;overflow:hidden;font-family:"PingFang SC","Noto Sans SC",-apple-system,sans-serif;
  background:#0a0d12;color:#fff;user-select:none;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center}
/* 顶部光晕 */
body::before{content:'';position:absolute;top:-20%;left:30%;width:60%;height:70%;
  background:radial-gradient(ellipse,rgba(244,210,138,.06) 0%,transparent 70%);
  z-index:0}
/* 底部网格 */
body::after{content:'';position:absolute;inset:0;z-index:0;opacity:.25;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px}
main{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:22px}
.logo{font-size:54px;font-weight:680;letter-spacing:-.04em;display:flex;align-items:baseline;gap:0}
.logo .m{color:rgba(255,255,255,.88);text-shadow:0 0 60px rgba(244,210,138,.08)}
.logo .r{background:linear-gradient(100deg,rgba(244,210,138,.9),rgba(166,220,198,.85),rgba(244,210,138,.9));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo .dot{display:inline-block;width:10px;height:10px;margin:0 2px 18px;border-radius:50%;background:rgba(244,210,138,.6);box-shadow:0 0 10px rgba(244,210,138,.3)}
.divider{width:280px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),rgba(244,210,138,.25),rgba(255,255,255,.15),transparent)}
.guide{display:flex;align-items:center;gap:28px;margin-top:8px}
.icon-spot{width:80px;height:80px;border-radius:18px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.icon-spot.app{font-size:36px;box-shadow:0 16px 40px rgba(0,0,0,.3)}
.icon-spot.folder{font-size:32px;border-style:dashed;border-color:rgba(255,255,255,.12)}
.arrow-svg{width:46px;height:30px;stroke:rgba(255,255,255,.22);stroke-width:1.4;fill:none}
.arrow-svg path{filter:drop-shadow(0 0 6px rgba(244,210,138,.15))}
.hint{font-size:13px;letter-spacing:.06em;color:rgba(255,255,255,.35);font-weight:500}
.tagline{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.14)}
</style></head><body>
<main>
  <div class="logo"><span class="m">Mine</span><span class="dot"></span><span class="r">radio</span></div>
  <div class="divider"></div>
  <div class="guide">
    <div class="icon-spot app">🎵</div>
    <svg class="arrow-svg" viewBox="0 0 46 30"><path d="M4 15h30l-7-7M34 8l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="icon-spot folder">📂</div>
  </div>
  <div class="hint">拖入 Applications 文件夹</div>
  <div class="tagline">Mineradio-MacOS · 沉浸式音乐可视化</div>
</main>
</body></html>
